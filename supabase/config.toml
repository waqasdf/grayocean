# A string used to distinguish different Supabase projects on the same host
project_id = "grayocean"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/Login", "https://YOUR_DOMAIN/Login"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
